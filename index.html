<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Согласование Интервизий</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, setDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously,
            getFirestore, collection, onSnapshot, setDoc, doc
        };
    </script>

    <script type="text/babel">
        const getStartOfWeek = (date) => {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.getFullYear(), d.getMonth(), diff);
        };

        const getWeekDays = (startDate) => Array.from({length: 7}, (_, i) => new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + i));
        
        const formatDateForKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        
        const formatDayHeader = (date) => {
            const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
            return `${days[date.getDay()]}, ${String(date.getDate()).padStart(2, '0')}.${String(date.getMonth() + 1).padStart(2, '0')}`;
        };

        const formatFriendlyDate = (dateString) => {
            const [year, month, day] = dateString.split('-');
            const date = new Date(year, parseInt(month) - 1, day);
            const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
            const months = ['янв', 'фев', 'мар', 'апр', 'мая', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
            return `${parseInt(day)} ${months[parseInt(month) - 1]} (${days[date.getDay()]})`;
        };

        const HOURS = Array.from({length: 13}, (_, i) => `${(i + 9).toString().padStart(2, '0')}:00`);
        
        const USER_COLORS = ['bg-blue-500', 'bg-rose-500', 'bg-amber-500', 'bg-emerald-500', 'bg-purple-500', 'bg-cyan-500', 'bg-indigo-500'];

        const UserManager = ({ users, myUid, onAddUser }) => {
            const [newUserName, setNewUserName] = React.useState('');
            const me = users.find(u => u.id === myUid);

            const handleAdd = (e) => {
                e.preventDefault();
                if (newUserName.trim()) onAddUser(newUserName.trim());
            };

            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6">
                    {!me ? (
                        <div>
                            <h2 className="text-lg font-semibold text-slate-800 mb-4">Представьтесь, чтобы присоединиться</h2>
                            <form onSubmit={handleAdd} className="flex gap-2">
                                <input type="text" value={newUserName} onChange={(e) => setNewUserName(e.target.value)} placeholder="Ваше имя..." className="flex-1 px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
                                <button type="submit" className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors">Войти</button>
                            </form>
                        </div>
                    ) : (
                        <div>
                            <h2 className="text-lg font-semibold text-slate-800 mb-4">Команда онлайн</h2>
                            <div className="flex flex-wrap gap-3">
                                {users.map(user => (
                                    <div key={user.id} className={`px-4 py-2 rounded-full text-sm font-medium transition-all flex items-center gap-2 ${user.id === myUid ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 text-slate-600'}`}>
                                        <div className={`w-3 h-3 rounded-full ${user.color}`}></div>
                                        {user.name} {user.id === myUid && "(Вы)"}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ScheduleGrid = ({ availability, myUid, isRegistered, users, onToggleSlot, currentWeekStart, onPrevWeek, onNextWeek, onCurrentWeek }) => {
            const weekDays = getWeekDays(currentWeekStart);

            const getCellStyles = (dateStr, hour) => {
                const slotKey = `${dateStr}-${hour}`;
                const peopleHere = availability[slotKey] || [];
                const count = peopleHere.length;
                let baseClass = "h-12 border-b border-r border-slate-100 transition-all relative overflow-hidden group ";
                
                if (isRegistered) baseClass += "cursor-pointer ";
                else baseClass += "cursor-not-allowed opacity-80 ";
                
                if (count === 0) baseClass += (isRegistered ? "bg-white hover:bg-slate-50" : "bg-white");
                else if (count === 1) baseClass += (isRegistered ? "bg-emerald-50 hover:bg-emerald-100" : "bg-emerald-50");
                else if (count === 2) baseClass += (isRegistered ? "bg-emerald-200 hover:bg-emerald-300" : "bg-emerald-200");
                else if (count >= 3) baseClass += (isRegistered ? "bg-emerald-400 hover:bg-emerald-500 shadow-inner" : "bg-emerald-400 shadow-inner");

                return { baseClass, peopleHere };
            };

            const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            
            return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-6">
                    <div className="p-4 border-b border-slate-100 bg-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-2">
                            <button onClick={onPrevWeek} className="p-2 hover:bg-slate-200 rounded-lg text-slate-600 transition-colors">◁</button>
                            <button onClick={onCurrentWeek} className="px-3 py-1.5 bg-white border border-slate-200 hover:bg-slate-50 rounded-lg text-sm font-medium text-slate-700 transition-colors">Сегодня</button>
                            <button onClick={onNextWeek} className="p-2 hover:bg-slate-200 rounded-lg text-slate-600 transition-colors">▷</button>
                            <span className="ml-2 text-slate-800 font-semibold capitalize">{monthNames[currentWeekStart.getMonth()]} {currentWeekStart.getFullYear()}</span>
                        </div>
                    </div>
                    
                    <div className="overflow-x-auto no-scrollbar">
                        <div className="min-w-[800px]">
                            <div className="grid grid-cols-8 border-b border-slate-200 bg-slate-50">
                                <div className="p-3 text-center text-sm font-medium text-slate-400 border-r border-slate-200">Время</div>
                                {weekDays.map(date => (
                                    <div key={date.toString()} className={`p-3 text-center text-sm font-semibold border-r border-slate-100 text-slate-700`}>
                                        {formatDayHeader(date)}
                                    </div>
                                ))}
                            </div>
                            {HOURS.map(hour => (
                                <div key={hour} className="grid grid-cols-8">
                                    <div className="p-2 text-center text-sm text-slate-500 border-r border-slate-200 border-b border-slate-100 bg-slate-50 flex items-center justify-center">{hour}</div>
                                    {weekDays.map(date => {
                                        const dateStr = formatDateForKey(date);
                                        const { baseClass, peopleHere } = getCellStyles(dateStr, hour);
                                        return (
                                            <div key={`${dateStr}-${hour}`} onClick={() => isRegistered && onToggleSlot(dateStr, hour)} className={baseClass}>
                                                <div className="absolute inset-0 flex items-center justify-center gap-1 flex-wrap p-1">
                                                    {peopleHere.map(id => {
                                                        const user = users.find(u => u.id === id);
                                                        return user ? <div key={id} className={`w-3 h-3 rounded-full shadow-sm border border-white/50 ${user.color}`}></div> : null;
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const MatchResults = ({ availability, users }) => {
            const matches = Object.entries(availability)
                .filter(([_, people]) => people.length >= 3)
                .map(([key, people]) => {
                    const parts = key.split('-');
                    const hour = parts.pop();
                    const dateStr = parts.join('-');
                    return { dateStr, hour, people, key };
                })
                .sort((a, b) => b.people.length !== a.people.length ? b.people.length - a.people.length : a.key.localeCompare(b.key));

            if (matches.length === 0) return (
                <div className="bg-indigo-50 p-6 rounded-2xl text-center border border-indigo-100">
                    <h3 className="text-lg font-semibold text-indigo-900 mb-1">Пока нет совпадений</h3>
                    <p className="text-indigo-700 text-sm">Ждем 3 или более коллег.</p>
                </div>
            );

            return (
                <div className="bg-emerald-50 border border-emerald-100 p-6 rounded-2xl">
                    <h3 className="text-lg font-semibold text-emerald-900 mb-4">✨ Идеальное время</h3>
                    <div className="space-y-3 max-h-[60vh] overflow-y-auto no-scrollbar">
                        {matches.map((match, idx) => (
                            <div key={idx} className="bg-white p-4 rounded-xl shadow-sm flex items-center justify-between border border-emerald-50">
                                <div className="flex items-center gap-4">
                                    <div className="bg-emerald-100 text-emerald-800 font-bold py-2 px-3 rounded-lg text-center min-w-[105px]">
                                        <div className="text-xs uppercase">{formatFriendlyDate(match.dateStr)}</div>
                                        <div className="text-xl">{match.hour}</div>
                                    </div>
                                    <div className="flex flex-wrap gap-1.5">
                                        {match.people.map(id => {
                                            const user = users.find(u => u.id === id);
                                            return user ? <span key={id} className="inline-flex items-center gap-1.5 px-2 py-1 rounded bg-slate-50 text-xs font-medium text-slate-600"><div className={`w-2 h-2 rounded-full ${user.color}`}></div>{user.name}</span> : null;
                                        })}
                                    </div>
                                </div>
                                <div className="text-emerald-600 font-bold text-lg">{match.people.length} чел.</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [users, setUsers] = React.useState([]);
            const [availability, setAvailability] = React.useState({});
            const [myUid, setMyUid] = React.useState(null);
            const [isReady, setIsReady] = React.useState(false);
            const [dbApi, setDbApi] = React.useState(null);
            const [currentWeekStart, setCurrentWeekStart] = React.useState(getStartOfWeek(new Date()));

            React.useEffect(() => {
                let unsubUsers = () => {};
                let unsubAvail = () => {};

                const initFirebase = async () => {
                    while (!window.FirebaseAPI) await new Promise(r => setTimeout(r, 50));

                    try {
                        const { initializeApp, getAuth, signInAnonymously, getFirestore, collection, onSnapshot, setDoc, doc } = window.FirebaseAPI;

                        // ВАШИ КЛЮЧИ ИЗ FIREBASE
                        const config = {
                            apiKey: "AIzaSyCO8vMwdzDeezk8OwlLZZ7YCG0ZHK_tM8w",
                            authDomain: "intervisiontime.firebaseapp.com",
                            projectId: "intervisiontime",
                            storageBucket: "intervisiontime.firebasestorage.app",
                            messagingSenderId: "240799750951",
                            appId: "1:240799750951:web:4e65b53f223da58c862702"
                        };
                        
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const db = getFirestore(app);

                        const cred = await signInAnonymously(auth);
                        if (!cred.user) return; 
                        
                        setMyUid(cred.user.uid);
                        setDbApi({ db, setDoc, doc, appId: 'intervision-team-app' });

                        const usersRef = collection(db, 'users');
                        unsubUsers = onSnapshot(usersRef, (snap) => {
                            const loadedUsers = [];
                            snap.forEach(d => loadedUsers.push(d.data()));
                            setUsers(loadedUsers);
                        }, err => console.error("Ошибка пользователей:", err));

                        const availRef = collection(db, 'availability');
                        unsubAvail = onSnapshot(availRef, (snap) => {
                            const loadedAvail = {};
                            snap.forEach(d => { loadedAvail[d.id] = d.data().people || []; });
                            setAvailability(loadedAvail);
                            setIsReady(true);
                        }, err => console.error("Ошибка сетки:", err));

                    } catch (error) {
                        console.error("Ошибка сети или базы данных:", error);
                        // Если база еще не создана, покажем, что загрузилось, чтобы вы видели интерфейс
                        setIsReady(true); 
                    }
                };
                
                initFirebase();
                return () => { unsubUsers(); unsubAvail(); };
            }, []);

            const handleAddUser = async (name) => {
                if (!dbApi || !myUid) return;
                const color = USER_COLORS[users.length % USER_COLORS.length];
                const userDoc = dbApi.doc(dbApi.db, 'users', myUid);
                await dbApi.setDoc(userDoc, { id: myUid, name, color });
            };

            const handleToggleSlot = async (dateStr, hour) => {
                if (!dbApi || !myUid) return;
                const isRegistered = users.some(u => u.id === myUid);
                if (!isRegistered) return;

                const slotKey = `${dateStr}-${hour}`;
                const currentPeople = availability[slotKey] || [];
                const isSelected = currentPeople.includes(myUid);
                
                const newPeople = isSelected ? currentPeople.filter(id => id !== myUid) : [...currentPeople, myUid];
                setAvailability(prev => ({ ...prev, [slotKey]: newPeople }));

                const slotDoc = dbApi.doc(dbApi.db, 'availability', slotKey);
                await dbApi.setDoc(slotDoc, { people: newPeople });
            };

            if (!isReady) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50">
                    <p className="text-slate-500 font-medium">Синхронизация с базой данных...</p>
                </div>
            );

            const isRegistered = users.some(u => u.id === myUid);

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    <header className="mb-8">
                        <h1 className="text-3xl font-bold text-slate-900 flex items-center gap-3">🗓️ Интервизии</h1>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2">
                            <UserManager users={users} myUid={myUid} onAddUser={handleAddUser} />
                            <ScheduleGrid 
                                availability={availability} 
                                myUid={myUid}
                                isRegistered={isRegistered}
                                users={users}
                                onToggleSlot={handleToggleSlot}
                                currentWeekStart={currentWeekStart}
                                onPrevWeek={() => { const d = new Date(currentWeekStart); d.setDate(d.getDate() - 7); setCurrentWeekStart(d); }}
                                onNextWeek={() => { const d = new Date(currentWeekStart); d.setDate(d.getDate() + 7); setCurrentWeekStart(d); }}
                                onCurrentWeek={() => setCurrentWeekStart(getStartOfWeek(new Date()))}
                            />
                        </div>
                        <div className="lg:col-span-1">
                            <div className="sticky top-8"><MatchResults availability={availability} users={users} /></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
